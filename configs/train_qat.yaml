# 公司 GPU 训练配置

model:
  name: "meta-llama/Llama-3.2-1B"
  torch_dtype: bfloat16

# 详细版配置：weight 4-bit + input 8-bit + output 不量化
quant:
  method: "qat"
  weight:
    type: "ste"
    bits: 4
    symmetric: true
    per_channel: true
    enabled: true
  input:
    type: "ste"
    bits: 8
    symmetric: false
    per_channel: false
    enabled: false           # 暂时不打开，后续实验逐步开启
  output:
    enabled: false

training:
  output_dir: "checkpoints/"
  num_epochs: 5
  per_device_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2e-5
  weight_decay: 0.01
  warmup_steps: 50
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  fp16: true
  distributed: false

data:
  dataset: "wikitext"
  subset: "wikitext-2-v1"
  text_column: "text"
  max_seq_length: 512
  val_split: 0.05
