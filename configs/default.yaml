# 默认训练配置

model:
  name: "Qwen/Qwen2.5-0.5B"        # 本地开发用 ~0.5B 模型，公司可改成 7B
  load_in_8bit: false
  torch_dtype: float32              # CPU 开发时用 float32

quant:
  method: "qat"                     # qat | lsq | gptq_ft
  bits: 8
  symmetric: false
  per_channel: true
  # QAT 参数
  qat:
    start_epoch: 0                  # 从第几个 epoch 开始插入伪量化
    calibrate_first: true           # 先跑 calibration 初始化 scale/zero_point

training:
  output_dir: "checkpoints/"
  num_epochs: 3
  per_device_batch_size: 2          # CPU 调小，公司卡改大
  gradient_accumulation_steps: 1
  learning_rate: 5e-5
  warmup_steps: 100
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  fp16: false                       # CPU 不开，公司卡改为 true
  distributed: false

data:
  dataset: "wikitext"
  subset: "wikitext-2-v1"
  text_column: "text"
  max_seq_length: 128               # 本地调小，公司改 2048
  val_split: 0.05
